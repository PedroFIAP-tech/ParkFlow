server:
  port: ${PORT:${SERVER_PORT:8080}}

spring:
  application:
    name: parkflow-api
  datasource:
    url: ${DATABASE_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/parkflow}}
    username: ${DATABASE_USERNAME:${SPRING_DATASOURCE_USERNAME:parkflow}}
    password: ${DATABASE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:parkflow}}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}}
  jwt:
    secret: ${JWT_SECRET:parkflow_2026_ultra_secure_jwt_secret}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:720}
  seed:
    admin-email: ${APP_SEED_ADMIN_EMAIL:admin@parkflow.com}
    admin-password: ${APP_SEED_ADMIN_PASSWORD:ParkFlow@2026}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
